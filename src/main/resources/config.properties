# Railway Management System - Configuration Properties

# Database Configuration
db.host=localhost
db.port=3306
db.name=railway_management
db.user=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver

# Connection Pool
db.pool.size=10
db.pool.maxIdle=5
db.pool.maxWait=30000

# Application Configuration
app.name=Railway Management System
app.version=1.0.0
app.environment=development

# Server Configuration
server.host=localhost
server.port=8080
server.timeout=30000

# Session Configuration
session.timeout=30
session.rememberMe=true

# Security Configuration
security.password.minLength=8
security.password.requireUppercase=true
security.password.requireSpecialChars=true
security.encryption.algorithm=SHA-256

# Booking Configuration
booking.cancellationWindow=24
booking.maxPassengersPerBooking=6
booking.maxBookingsPerDay=10

# Refund Policy
refund.policy.moreThan48hrs=100
refund.policy.24to48hrs=50
refund.policy.lessThan24hrs=0

# Email Configuration
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.tls=true
email.sender=noreply@railwaymgt.com
email.senderName=Railway Management System

# File Upload Configuration
file.upload.maxSize=5242880
file.upload.allowedTypes=pdf,jpg,jpeg,png
file.upload.directory=/uploads/

# Logging Configuration
logging.level=INFO
logging.file=logs/app.log
logging.maxFileSize=10MB
logging.maxBackupIndex=10

# Feature Flags
feature.emailNotifications=true
feature.smsNotifications=false
feature.reports=true
feature.analytics=true
feature.multiLanguage=false

# UI Configuration
ui.theme=LIGHT
ui.language=en_IN
ui.dateFormat=dd-MM-yyyy
ui.timeFormat=HH:mm:ss

# System Configuration
system.timezone=Asia/Kolkata
system.currency=INR
system.decimalPlaces=2
system.maintenanceMode=false
